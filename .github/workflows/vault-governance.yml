name: Vault Governance

# Runs the engine test suite plus whole-vault metadata validation and lint
# checks. `check-policy` additionally gates ai/* pull requests against the AI
# write policy (no-op for non-ai branches).

on:
  push:
    branches: [master]
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # check-policy needs history to diff against the base

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install engine
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Lint vault metadata (fixable drift)
        run: python -m vault_governance.cli lint --vault ../Vault --check

      - name: Validate vault schema
        run: python -m vault_governance.cli validate --vault ../Vault

      - name: Enforce AI write policy (ai/* PRs only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          python -m vault_governance.cli check-policy \
            --vault ../Vault \
            --base "origin/${{ github.base_ref }}" \
            --head HEAD \
            --branch "${{ github.head_ref }}"
